name: Bug Report
description: Report a reproducible issue
title: "[Bug] "
labels: ["bug"]

body:
  - type: textarea
    attributes:
      label: Description
      description: Describe the issue clearly
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Provide step-by-step instructions

  - type: textarea
    attributes:
      label: Expected behavior

  - type: textarea
    attributes:
      label: Environment
      description: OS, version, hardware, etc.
